services:
  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@postgres:5432/aegis
      CHROMA_PATH: /app/data/chroma
      UPLOAD_DIR: /app/data/uploads
      WORKSPACE_ROOT: /app/workspace
    ports:
      - "8000:8000"
    volumes:
      - aegis_api_data:/app/data
      - ./workspace:/app/workspace
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports:
      - "5432:5432"
    volumes:
      - aegis_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aegis_api_data:
  aegis_postgres:
